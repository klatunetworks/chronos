name: run tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java:
          - distribution: temurin
            version: 8
          - distribution: temurin
            version: 11
        cassandra:
          - '5'
        redis:
          - '8'

    services:
      cassandra:
        image: cassandra:${{ matrix.cassandra }}
        ports:
          - 9042:9042
          - 7000:7000
          - 7001:7001
          - 7199:7199
        env:
          CASSANDRA_CLUSTER_NAME: TestCluster
          MAX_HEAP_SIZE: 1G
          HEAP_NEWSIZE: 256M
        options: >-
          --memory 2G
          --memory-reservation 1G
          --health-cmd "cqlsh -e 'describe keyspaces'"
          --health-interval 30s
          --health-retries 10
          --health-timeout 10s

      redis:
        image: redis:${{ matrix.redis }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
          --health-timeout 3s

    name: Java ${{ matrix.java.distribution }}/${{ matrix.java.version }} sample
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.java.distribution }}
          java-version: ${{ matrix.java.version }}
          cache: 'gradle'

      - name: Run tests
        shell: bash
        run: ./gradlew clean test --no-daemon --parallel --continue

      - name: Upload Test Results
        if: (!cancelled())
        uses: actions/upload-artifact@v7
        with:
          name: java-${{ matrix.java.distribution }}-${{ matrix.java.version }})-test-results
          path: '**/build/test-results/**/*.xml'

  publish-test-results:
    name: "Publish Tests Results"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    if: (!cancelled())

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          comment_mode: failures
          files: "artifacts/**/*.xml"
