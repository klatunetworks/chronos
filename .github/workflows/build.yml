name: run tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java:
          - '8'
          - '11'
        java-distribution:
          - temurin
          - oracle
        cassandra:
          - '5'
        redis:
          - '8'

    services:
      cassandra:
        image: cassandra:${{ matrix.cassandra }}
        ports:
          - 9042:9042
          - 7000:7000
          - 7001:7001
          - 7199:7199
        environment:
          - CASSANDRA_CLUSTER_NAME=TestCluster
          # Explicitly restrict heap size to stop Out-Of-Memory crashes
          - MAX_HEAP_SIZE=1G
          - HEAP_NEWSIZE=256M
          # Give the container enough physical host memory to run
        deploy:
          resources:
            limits:
              memory: 2G
            reservations:
              memory: 1G
        healthcheck:
          test: ["CMD-SHELL", "nodetool status | grep -E '^UN\\s+' || exit 1"]
          interval: 15s
          timeout: 10s
          retries: 5
          start_period: 45s

      redis:
        image: redis:${{ matrix.redis }}
        ports:
          - 6379:6379
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 5s
          timeout: 3s
          retries: 5
          start_period: 5s

    name: Java ${{ matrix.java-distribution }}/${{ matrix.java }} sample
    steps:
      - uses: actions/checkout@v7

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.java-distribution }}
          java-version: ${{ matrix.java }}

      - shell: bash
        run: ./gradlew clean test
