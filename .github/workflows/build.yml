name: run tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java:
          - '8'
          - '11'
        java-distribution:
          - temurin
          - oracle
        cassandra:
          - '5'
        redis:
          - '8'

    services:
      cassandra:
        image: cassandra:${{ matrix.cassandra }}
        ports:
          - 9042:9042
          - 7000:7000
          - 7001:7001
          - 7199:7199
        env:
          CASSANDRA_CLUSTER_NAME: TestCluster
          # Explicitly restrict heap size to stop Out-Of-Memory crashes
          MAX_HEAP_SIZE: 1G
          HEAP_NEWSIZE: 256M
          # Give the container enough physical host memory to run
        options: >-
          --memory 2G
          --memory-reservation 1G
          --health-cmd "nodetool status | grep -E '^UN\\s+' || exit 1"
          --health-interval 15s
          --health-retries 5
          --health-start-period 45s
          --health-timeout 10s

      redis:
        image: redis:${{ matrix.redis }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
          --health-start-period 5s
          --health-timeout 3s

    name: Java ${{ matrix.java-distribution }}/${{ matrix.java }} sample
    steps:
      - uses: actions/checkout@v7

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.java-distribution }}
          java-version: ${{ matrix.java }}

      - shell: bash
        run: ./gradlew clean test
